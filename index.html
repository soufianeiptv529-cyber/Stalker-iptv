
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR.DINAR IPTV</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#020b3d,#091b7a,#001aff);
min-height:100vh;
color:white;
}

.container{
width:95%;
max-width:900px;
margin:auto;
padding-top:30px;
}

.logo{
font-size:38px;
font-weight:bold;
text-align:center;
color:#00e1ff;
margin-bottom:25px;
text-shadow:0 0 15px #00e1ff;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.2);
border-radius:25px;
padding:25px;
box-shadow:0 0 25px rgba(0,225,255,0.3);
}

.input-box{
margin-top:20px;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:white;
font-size:16px;
outline:none;
}

.buttons{
display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
}

button{
padding:15px 35px;
border:none;
border-radius:15px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.play{
background:#00e1ff;
color:black;
}

.play:hover{
transform:scale(1.05);
}

.clear{
background:#ff004c;
color:white;
}

.clear:hover{
transform:scale(1.05);
}

video{
width:100%;
height:260px;
margin-top:25px;
border-radius:20px;
background:black;
border:2px solid #00e1ff;
}

.info{
margin-top:20px;
text-align:center;
font-size:14px;
color:#cfcfcf;
}

.channels{
margin-top:25px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.channel{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:15px;
transition:0.3s;
}

.channel:hover{
background:#00e1ff;
color:black;
transform:scale(1.03);
}

.footer{
text-align:center;
margin-top:25px;
color:#9aa4ff;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
MR.DINAR IPTV
</div>

<div class="card">

<h2>Premium IPTV Player</h2>

<div class="input-box">
<input type="text" id="m3u8" placeholder="Paste M3U8 Live Stream Link">
</div>

<div class="buttons">
<button class="play" onclick="playVideo()">PLAY NOW</button>
<button class="clear" onclick="clearVideo()">CLEAR</button>
</div>

<video id="video" controls autoplay></video>

<div class="info">
Fast Streaming • HD Quality • IPTV Player
</div>

<div class="channels">

<div class="channel">SPORT CHANNEL</div>
<div class="channel">MOVIES CHANNEL</div>
<div class="channel">KIDS CHANNEL</div>
<div class="channel">NEWS CHANNEL</div>

</div>

</div>

<div class="footer">
© 2026 MR.DINAR IPTV
</div>

</div>

<script>

function playVideo(){

let url = document.getElementById("m3u8").value;

document.getElementById("video").src = url;

}

function clearVideo(){

document.getElementById("m3u8").value = "";
document.getElementById("video").src = "";

}

</script>

</body>
</html>
